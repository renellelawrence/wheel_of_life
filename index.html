<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wheel of Life — Interactive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E1612;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.18);
    --ink: #F2EDE4;
    --muted: rgba(242,237,228,0.55);
    --accent: #B4D470;
    --accent-soft: rgba(180,212,112,0.18);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; color: var(--ink); font-family: 'DM Sans', system-ui, sans-serif; min-height: 100vh; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 32px 48px; }

  .layout { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 56px; align-items: start; }
  @media (max-width: 880px) {
    .layout { grid-template-columns: 1fr; gap: 40px; }
  }

  .controls { display: flex; flex-direction: column; gap: 18px; padding: 28px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
  .controls-title { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .slider-row { display: grid; grid-template-columns: 110px 1fr 28px; align-items: center; gap: 12px; }
  .slider-label { font-size: 13px; color: var(--ink); }
  .slider-value { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); text-align: right; }
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; background: var(--border-strong);
    border-radius: 999px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent);
    border: 2px solid transparent;
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); border: 2px solid transparent;
    cursor: pointer;
  }
  .reset {
    margin-top: 4px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border-strong);
    padding: 10px 16px;
    border-radius: 999px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    cursor: pointer;
    transition: color 180ms, border-color 180ms;
  }
  .reset:hover { color: var(--ink); border-color: var(--ink); }
  .submit {
    margin-top: 4px;
    background: var(--accent);
    color: var(--bg);
    border: 1px solid var(--accent);
    padding: 12px 16px;
    border-radius: 999px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 180ms, background 180ms;
  }
  .submit:hover { opacity: 0.88; }
  .submit:disabled {
    background: var(--surface);
    color: var(--muted);
    border-color: var(--border-strong);
    cursor: default;
    opacity: 1;
  }
  .submit-note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    text-align: center;
    margin-top: 2px;
  }
</style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#0E1612">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0E1612"/>
      <g transform="translate(600 400)">
        <circle r="220" fill="none" stroke="#B4D470" stroke-width="1.5" opacity="0.3"/>
        <circle r="165" fill="none" stroke="#B4D470" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 6"/>
        <circle r="110" fill="none" stroke="#B4D470" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 6"/>
        <circle r="6" fill="#B4D470"/>
        <g fill="#B4D470" opacity="0.45">
          <path d="M 0 0 L -67 -162 A 175 175 0 0 1 67 -162 Z"/>
          <path d="M 0 0 L 99 -99 A 140 140 0 0 1 140 0 Z"/>
          <path d="M 0 0 L 90 90 A 127 127 0 0 1 0 127 Z"/>
        </g>
      </g>
    </svg>
  </template>

  <div id="root"></div>

  <script>
    // Buffer ink:init (and any other) messages that arrive before React mounts.
    // The parent posts ink:init on iframe load — earlier than React's useEffect runs.
    window.__inkPending = [];
    window.__inkHandler = (e) => window.__inkPending.push(e);
    window.addEventListener("message", window.__inkHandler);
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const PALETTE = {
      accent: "#B4D470",
      border: "rgba(255,255,255,0.10)",
    };
    const FONT_DISPLAY = "'Fraunces', serif";
    const FONT_MONO = "'IBM Plex Mono', monospace";

    const AREAS = [
      { id: "career",        short: "CAREER",   full: "Career",            angle: 0 },
      { id: "finances",      short: "FINANCES", full: "Finances",          angle: 45 },
      { id: "health",        short: "HEALTH",   full: "Health",            angle: 90 },
      { id: "relationships", short: "FAMILY",   full: "Family & Friends",  angle: 135 },
      { id: "romance",       short: "ROMANCE",  full: "Romance",           angle: 180 },
      { id: "growth",        short: "GROWTH",   full: "Growth",            angle: 225 },
      { id: "fun",           short: "FUN",      full: "Fun",               angle: 270 },
      { id: "environment",   short: "HOME",     full: "Environment",       angle: 315 }
    ];

    const BLANK = { career: null, finances: null, health: null, relationships: null, romance: null, growth: null, fun: null, environment: null };

    function InteractiveWheel({ scores }) {
      const [hovered, setHovered] = React.useState(null);
      const [anim, setAnim] = React.useState(1);
      const prevScores = React.useRef(scores);

      // Animate on score change (transition from old radius to new)
      React.useEffect(() => {
        let raf, start;
        setAnim(0);
        const dur = 600;
        const ease = (t) => 1 - Math.pow(1 - t, 3);
        const tick = (t) => {
          if (start == null) start = t;
          const p = Math.min(1, (t - start) / dur);
          setAnim(ease(p));
          if (p < 1) raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [JSON.stringify(scores)]);

      const cx = 280, cy = 260;
      const rMax = 180;
      const labelR = 210;

      const polar = (r, deg) => {
        const rad = (deg - 90) * Math.PI / 180;
        return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
      };
      const slicePath = (r, startDeg, endDeg) => {
        const [x1, y1] = polar(r, startDeg);
        const [x2, y2] = polar(r, endDeg);
        return `M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r.toFixed(2)} ${r.toFixed(2)} 0 0 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`;
      };

      const validScores = AREAS
        .map((a) => ({ id: a.id, v: Number(scores?.[a.id]) }))
        .filter((s) => s.v >= 1 && s.v <= 10);
      const avg = validScores.length
        ? validScores.reduce((sum, s) => sum + s.v, 0) / validScores.length
        : 0;
      const lowest = validScores.length
        ? validScores.reduce((m, s) => (s.v < m.v ? s : m), validScores[0])
        : null;
      const highest = validScores.length
        ? validScores.reduce((m, s) => (s.v > m.v ? s : m), validScores[0])
        : null;

      const hoveredArea = hovered ? AREAS.find((a) => a.id === hovered) : null;
      const hoveredScore = hovered ? Number(scores?.[hovered]) : null;
      const hoveredValid = hoveredScore >= 1 && hoveredScore <= 10;

      return (
        <div style={{ width: "100%", display: "flex", flexDirection: "column", alignItems: "center" }}>
          <svg width="100%" viewBox="0 0 560 520" style={{ maxWidth: 560, display: "block", overflow: "visible" }}>
            {[0.2, 0.4, 0.6, 0.8, 1].map((f, i) =>
              <circle key={`ring-${i}`} cx={cx} cy={cy} r={rMax * f}
                fill="none" stroke={PALETTE.border} strokeWidth="1"
                strokeDasharray={i === 4 ? "" : "2 5"} />
            )}

            {AREAS.map((a, i) => {
              const deg = a.angle - 22.5;
              const [x, y] = polar(rMax, deg);
              return <line key={`spoke-${i}`} x1={cx} y1={cy} x2={x.toFixed(2)} y2={y.toFixed(2)}
                stroke={PALETTE.border} strokeWidth="1" />;
            })}

            {AREAS.map((a, i) => {
              const raw = Number(scores?.[a.id]);
              const prev = Number(prevScores.current?.[a.id]) || 0;
              const valid = raw >= 1 && raw <= 10;
              const targetR = valid ? (raw / 10) * rMax : 0;
              const prevR = prev >= 1 && prev <= 10 ? (prev / 10) * rMax : 0;
              const r = prevR + (targetR - prevR) * anim;
              const startDeg = a.angle - 22.5;
              const endDeg = a.angle + 22.5;
              const isHover = hovered === a.id;
              const isDim = hovered && !isHover;
              if (r < 1) return null;
              return (
                <path key={`fill-${i}`} d={slicePath(r, startDeg, endDeg)}
                  fill={PALETTE.accent}
                  fillOpacity={isHover ? 0.85 : isDim ? 0.18 : 0.38}
                  stroke={isHover ? PALETTE.accent : "none"}
                  strokeWidth="1"
                  style={{ transition: "fill-opacity 180ms ease, stroke 180ms ease" }} />
              );
            })}

            {AREAS.map((a, i) => {
              const startDeg = a.angle - 22.5;
              const endDeg = a.angle + 22.5;
              const raw = Number(scores?.[a.id]);
              const valid = raw >= 1 && raw <= 10;
              const [nx, ny] = polar(rMax + 12, a.angle);
              const isHover = hovered === a.id;
              return (
                <g key={`hit-${i}`}
                  onMouseEnter={() => setHovered(a.id)}
                  onMouseLeave={() => setHovered(null)}
                  style={{ cursor: "pointer" }}>
                  <path d={slicePath(rMax + 14, startDeg, endDeg)} fill="transparent" />
                  {valid &&
                    <text x={nx.toFixed(2)} y={ny.toFixed(2)}
                      textAnchor="middle" dominantBaseline="middle"
                      fontFamily={FONT_MONO} fontSize="11" fontWeight="600" letterSpacing="2"
                      fill={isHover ? PALETTE.accent : "rgba(255,255,255,0.55)"}
                      style={{ transition: "fill 180ms ease", pointerEvents: "none" }}>
                      {raw}
                    </text>
                  }
                </g>
              );
            })}

            {AREAS.map((a, i) => {
              const [x, y] = polar(labelR, a.angle);
              let anchor = "middle";
              if (x < cx - 6) anchor = "end";
              else if (x > cx + 6) anchor = "start";
              const isHover = hovered === a.id;
              return (
                <text key={`label-${i}`} x={x.toFixed(2)} y={y.toFixed(2)}
                  textAnchor={anchor} dominantBaseline="middle"
                  fontFamily={FONT_MONO} fontSize="11" letterSpacing="3" fontWeight="500"
                  fill={isHover ? "#FFFFFF" : "rgba(255,255,255,0.75)"}
                  style={{ transition: "fill 180ms ease", pointerEvents: "none" }}>
                  {a.short}
                </text>
              );
            })}

            <g style={{ pointerEvents: "none" }}>
              {hoveredArea && hoveredValid ? (
                <React.Fragment>
                  <text x={cx} y={cy - 14} textAnchor="middle"
                    fontFamily={FONT_MONO} fontSize="10" letterSpacing="3" fontWeight="500"
                    fill="rgba(255,255,255,0.6)">
                    {hoveredArea.full.toUpperCase()}
                  </text>
                  <text x={cx} y={cy + 18} textAnchor="middle"
                    fontFamily={FONT_DISPLAY} fontSize="42" fontWeight="400"
                    fontStyle="italic"
                    fill={PALETTE.accent}
                    style={{ fontVariationSettings: "'opsz' 144" }}>
                    {hoveredScore}
                    <tspan fontSize="20" fill="rgba(255,255,255,0.5)" dx="2"> /10</tspan>
                  </text>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <text x={cx} y={cy - 14} textAnchor="middle"
                    fontFamily={FONT_MONO} fontSize="10" letterSpacing="3" fontWeight="500"
                    fill="rgba(255,255,255,0.6)">
                    AVERAGE
                  </text>
                  <text x={cx} y={cy + 18} textAnchor="middle"
                    fontFamily={FONT_DISPLAY} fontSize="42" fontWeight="400"
                    fontStyle="italic"
                    fill={PALETTE.accent}
                    style={{ fontVariationSettings: "'opsz' 144" }}>
                    {avg ? avg.toFixed(1) : "—"}
                    <tspan fontSize="20" fill="rgba(255,255,255,0.5)" dx="2"> /10</tspan>
                  </text>
                </React.Fragment>
              )}
            </g>
          </svg>

          {!hovered && lowest && highest && lowest.id !== highest.id &&
            <div style={{
              marginTop: 20, display: "flex", gap: 32, flexWrap: "wrap", justifyContent: "center",
              fontFamily: FONT_MONO, fontSize: 11, letterSpacing: 2, color: "rgba(255,255,255,0.55)"
            }}>
              <div>FULLEST · <span style={{ color: PALETTE.accent }}>{(AREAS.find(a=>a.id===highest.id)||{}).full} · {highest.v}</span></div>
              <div>FLATTEST · <span style={{ color: PALETTE.accent }}>{(AREAS.find(a=>a.id===lowest.id)||{}).full} · {lowest.v}</span></div>
            </div>
          }
          {hovered &&
            <div style={{
              marginTop: 20, fontFamily: FONT_MONO, fontSize: 11, letterSpacing: 2, color: "rgba(255,255,255,0.45)"
            }}>
              HOVER ANY SEGMENT
            </div>
          }
        </div>
      );
    }

    // Clamp incoming variable to an integer in [1, 10]. Returns null for missing/invalid values.
    const clampScore = (v) => {
      const n = Number(v);
      if (!Number.isFinite(n)) return null;
      return Math.max(1, Math.min(10, Math.round(n)));
    };

    function App() {
      const [scores, setScores] = React.useState(BLANK);
      const [submitted, setSubmitted] = React.useState(false);
      const submittedRef = React.useRef(false);

      // Listen for ink:init — drain any messages buffered before React mounted,
      // then take over as the real listener.
      React.useEffect(() => {
        const apply = (e) => {
          if (!e.data || e.data.type !== "ink:init") return;
          const vars = e.data.variables || {};
          setScores({
            career:        clampScore(vars.career),
            finances:      clampScore(vars.finances),
            health:        clampScore(vars.health),
            relationships: clampScore(vars.relationships),
            romance:       clampScore(vars.romance),
            growth:        clampScore(vars.growth),
            fun:           clampScore(vars.fun),
            environment:   clampScore(vars.environment),
          });
        };
        // Drain anything that arrived before React mounted
        (window.__inkPending || []).forEach(apply);
        window.__inkPending = [];
        // Swap the buffering listener for the real one
        if (window.__inkHandler) {
          window.removeEventListener("message", window.__inkHandler);
          window.__inkHandler = null;
        }
        window.addEventListener("message", apply);
        return () => window.removeEventListener("message", apply);
      }, []);

      const set = (id, v) => setScores((s) => ({ ...s, [id]: v }));

      const allScored = Object.values(scores).every((v) => v != null);

      const handleSubmit = () => {
        if (submittedRef.current) return;
        if (!allScored) return;
        submittedRef.current = true;
        setSubmitted(true);

        const values = {
          career:        scores.career,
          finances:      scores.finances,
          health:        scores.health,
          relationships: scores.relationships,
          romance:       scores.romance,
          growth:        scores.growth,
          fun:           scores.fun,
          environment:   scores.environment,
        };

        parent.postMessage({ type: "ink:complete", values: values }, "*");
      };

      return (
        <div className="wrap">
          <div className="layout">
            <InteractiveWheel scores={scores} />
            <div className="controls">
              <div className="controls-title">Your scores</div>
              {AREAS.map((a) => (
                <div key={a.id} className="slider-row">
                  <div className="slider-label">{a.full}</div>
                  <input type="range" min="1" max="10" step="1"
                    value={scores[a.id] ?? 1}
                    onChange={(e) => set(a.id, Number(e.target.value))}
                    disabled={submitted}
                    style={{ accentColor: PALETTE.accent, opacity: scores[a.id] == null ? 0.4 : 1 }} />
                  <div className="slider-value">{scores[a.id] ?? "—"}</div>
                </div>
              ))}
              <button className="reset" onClick={() => setScores(BLANK)} disabled={submitted}>Reset</button>
              <button className="submit" onClick={handleSubmit} disabled={submitted || !allScored}>
                {submitted ? "Submitted" : "Save & continue"}
              </button>
              {submitted && <div className="submit-note">Your scores are saved.</div>}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
